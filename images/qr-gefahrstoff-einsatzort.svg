<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160" role="img" aria-label="QR-Code am Gefahrstoffbehälter mit digitalem Sicherheitsdatenblatt">
  <title>QR-Code am Gefahrstoffbehälter</title>
  <rect width="240" height="160" fill="#f8faff" rx="10"/>
  <!-- QR Code area (left half) -->
  <g transform="translate(18,18)">
    <!-- Top-left finder pattern -->
    <rect x="0" y="0" width="38" height="38" rx="3" fill="none" stroke="#1e293b" stroke-width="3.5"/>
    <rect x="7" y="7" width="24" height="24" rx="2" fill="#1e293b"/>
    <rect x="13" y="13" width="12" height="12" rx="1" fill="#f8faff"/>
    <!-- Top-right finder pattern -->
    <rect x="58" y="0" width="38" height="38" rx="3" fill="none" stroke="#1e293b" stroke-width="3.5"/>
    <rect x="65" y="7" width="24" height="24" rx="2" fill="#1e293b"/>
    <rect x="71" y="13" width="12" height="12" rx="1" fill="#f8faff"/>
    <!-- Bottom-left finder pattern -->
    <rect x="0" y="58" width="38" height="38" rx="3" fill="none" stroke="#1e293b" stroke-width="3.5"/>
    <rect x="7" y="65" width="24" height="24" rx="2" fill="#1e293b"/>
    <rect x="13" y="71" width="12" height="12" rx="1" fill="#f8faff"/>
    <!-- Data module dots -->
    <rect x="43" y="6" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="52" y="6" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="43" y="15" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="43" y="43" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="52" y="52" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="52" y="43" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="43" y="52" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="65" y="43" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="74" y="52" width="7" height="7" fill="#1e293b" rx="1"/>
    <rect x="83" y="43" width="7" height="7" fill="#1e293b" rx="1"/>
    <!-- SCAN label -->
    <text x="0" y="112" font-family="sans-serif" font-size="10" fill="#64748b" font-weight="700" letter-spacing="4">SCAN</text>
  </g>
  <!-- Vertical divider -->
  <line x1="128" y1="16" x2="128" y2="144" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- GHS warning symbol (right half) -->
  <g transform="translate(145,20)">
    <polygon points="42,0 84,73 0,73" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linejoin="round"/>
    <rect x="38.5" y="24" width="7" height="28" rx="3" fill="#f59e0b"/>
    <circle cx="42" cy="62" r="4.5" fill="#f59e0b"/>
    <text x="12" y="90" font-family="sans-serif" font-size="9" fill="#78716c">GHS07 · GHS08</text>
  </g>
</svg>
